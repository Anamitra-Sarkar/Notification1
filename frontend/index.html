<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Push Notifications</title>
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <div class="container">
        <h1>Push Notification Demo</h1>
        <p id="status">Checking notification support...</p>
        
        <div class="button-group">
            <button id="subscribeBtn" disabled>Subscribe to Notifications</button>
            <button id="unsubscribeBtn" disabled>Unsubscribe</button>
        </div>

        <div id="subscriptionInfo" class="hidden">
            <h3>Subscription Details</h3>
            <pre id="subscriptionJson"></pre>
        </div>
    </div>

    <script src="app.js"></script>
</body>
</html>
